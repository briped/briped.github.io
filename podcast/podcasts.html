<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR Lyd - Recycled</title>
    <style>
      :root {
        --bg:        #1a1a1a;
        --surface:   #242424;
        --border:    #333333;
        --accent:    #c0392b;
        --accent-hv: #e74c3c;
        --text:      #e8e8e8;
        --text-muted:#999999;
        --radius:    6px;
        --logo-h:    2rem;   /* height of both logos */
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg:        #f5f5f5;
          --surface:   #ffffff;
          --border:    #dddddd;
          --accent:    #c0392b;
          --accent-hv: #a93226;
          --text:      #1a1a1a;
          --text-muted:#666666;
        }
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }

      /* ── HEADER ─────────────────────────────────────────────── */
      header {
        background: var(--surface);
        border-bottom: 2px solid var(--accent);
        padding: 0.75rem 1.25rem;
      }

      .header-inner {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        align-items: center;   /* vertical centre for ALL children */
        gap: 0.75rem;
      }

      /* Logo links sit inline, no extra baseline weirdness */
      .logo-link {
        display: flex;          /* flex keeps the img from having extra bottom gap */
        align-items: center;
        flex-shrink: 0;
        line-height: 0;
      }

      .logo-link img {
        height: var(--logo-h);
        width: auto;
        display: block;
        transition: opacity 0.2s;
      }
      .logo-link:hover img { opacity: 0.75; }

      /* Title block grows to fill space between the two logos */
      .title {
        flex: 1;
        text-align: center;
      }
      .title h1 {
        font-size: clamp(1.1rem, 3vw, 1.6rem);
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.02em;
        line-height: 1.1;
      }
      .title p {
        font-size: clamp(0.7rem, 2vw, 0.85rem);
        color: var(--text-muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 0.1rem;
      }

      /* ── MAIN ────────────────────────────────────────────────── */
      main {
        max-width: 1400px;
        margin: 1.5rem auto;
        padding: 0 1rem;
      }

      /* ── PODCAST GRID ────────────────────────────────────────── */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1rem;
      }

      /* Each podcast card */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        transition: border-color 0.2s, transform 0.15s;
        display: flex;
        flex-direction: column;
      }
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }

      .card a {
        display: flex;
        flex-direction: column;
        height: 100%;
        text-decoration: none;
        color: inherit;
      }

      /* Cover image */
      .card-img-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #111;
      }
      .card-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s;
      }
      .card:hover .card-img-wrap img {
        transform: scale(1.04);
      }

      /* Episode count badge */
      .badge {
        position: absolute;
        top: 6px;
        right: 6px;
        background: rgba(0,0,0,0.75);
        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 10px;
        line-height: 1.4;
        backdrop-filter: blur(4px);
      }

      /* Card title */
      .card-body {
        padding: 0.5rem 0.6rem;
        flex: 1;
      }
      .card-body h2 {
        font-size: 0.78rem;
        font-weight: 600;
        line-height: 1.3;
        color: var(--text);
      }

      /* ── FOOTER ─────────────────────────────────────────────── */
      footer {
        text-align: center;
        padding: 1.5rem 1rem;
        color: var(--text-muted);
        font-size: 0.75rem;
        border-top: 1px solid var(--border);
        margin-top: 2rem;
      }

      /* ── RESPONSIVE TWEAKS ───────────────────────────────────── */
      @media (max-width: 480px) {
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
          gap: 0.75rem;
        }
      }
    </style>
  </head>
  <body>

  <header>
    <div class="header-inner">
      <!-- Left logo: DR Lyd -->
      <a class="logo-link" href="https://www.dr.dk/lyd" title="DR Lyd" target="_blank" rel="noopener">
        <img src="assets/icon-logo-drlyd.svg" alt="DR Lyd">
      </a>

      <!-- Centre title -->
      <div class="title">
        <h1>DR Lyd</h1>
        <p>Recycled</p>
      </div>

      <!-- Right logo: GitHub -->
      <a class="logo-link" href="https://github.com/briped/briped.github.io" title="GitHub" target="_blank" rel="noopener">
        <img src="assets/icon-logo-github-auto.svg" alt="GitHub">
      </a>
    </div>
  </header>

  <main>
    <div class="grid" id="podcast-grid">
      <!-- Populated by JavaScript -->
    </div>
  </main>

  <footer>
    <span id="last-updated"></span>
  </footer>

  <script>
    const grid = document.getElementById('podcast-grid');

    fetch('podcasts.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(podcasts => {
        podcasts.forEach(({ xml, cover, title, episodes }) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <a href="feed.html?podcast=${encodeURIComponent(xml)}">
              <div class="card-img-wrap">
                <img src="cover/${cover}" alt="${title}" loading="lazy" decoding="async">
                <span class="badge">${episodes}</span>
              </div>
              <div class="card-body">
                <h2>${title}</h2>
              </div>
            </a>`;
          grid.appendChild(card);
        });
      })
      .catch(err => {
        grid.innerHTML = `<p style="color:var(--text-muted);padding:2rem">Kunne ikke hente podcast-liste. (${err.message})</p>`;
      });

    // Show last-updated timestamp
    const ts = new Date().toLocaleString('da-DK', {
      timeZone: 'Europe/Copenhagen',
      dateStyle: 'medium',
      timeStyle: 'short'
    });
    document.getElementById('last-updated').textContent = `Sidst opdateret: ${ts}`;
  </script>

  </body>
</html>
