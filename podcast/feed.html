:root {
  --bg:        #0f0e0c;
  --surface:   #1a1916;
  --border:    #2e2b27;
  --text:      #ede8e0;
  --muted:     #7a7469;
  --accent:    #e8702a;
  --accent2:   #f0a05a;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ── loading state ── */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 1.5rem;
  color: var(--muted);
  font-size: .9rem;
  letter-spacing: .08em;
}

.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#error {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 1rem;
  color: var(--muted);
  text-align: center;
  padding: 2rem;
}
#error strong { color: var(--text); font-size: 1.1rem; }

/* ── header ── */
header {
  position: relative;
  overflow: hidden;
  padding: 3.5rem 2rem 3rem;
  border-bottom: 1px solid var(--border);
}

/* subtle radial glow */
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 100% at 20% 50%, rgba(232,112,42,.12) 0%, transparent 70%);
  pointer-events: none;
}

.header-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  gap: 2rem;
  align-items: flex-start;
  position: relative;
}

#podcast-image {
  width: 110px;
  height: 110px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}

.header-text { flex: 1; min-width: 0; }

.feed-label {
  display: inline-block;
  font-size: .65rem;
  font-weight: 500;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .8rem;
}

header h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  line-height: 1.15;
  margin-bottom: .6rem;
  letter-spacing: -.01em;
}

header p#podcast-description {
  font-size: .9rem;
  color: var(--muted);
  line-height: 1.65;
  max-width: 60ch;
  margin-bottom: .9rem;
}

.header-meta {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem .9rem;
  font-size: .75rem;
  color: var(--muted);
}

.header-meta a {
  color: var(--accent2);
  text-decoration: none;
}
.header-meta a:hover { text-decoration: underline; }

/* ── episode list ── */
main {
  max-width: 860px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}

.episodes-heading {
  font-size: .65rem;
  font-weight: 500;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.5rem;
  padding-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}

/* ── episode card ── */
.episode {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0 1.25rem;
  padding: 1.5rem 0;
  border-bottom: 1px solid var(--border);
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp .4s ease forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: none; }
}

.ep-number {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.4rem;
  color: var(--border);
  line-height: 1;
  padding-top: .2rem;
  min-width: 2.5rem;
  text-align: right;
  user-select: none;
}

.ep-body { min-width: 0; }

.ep-date {
  font-size: .7rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .35rem;
}

.ep-title {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 1.1rem;
  line-height: 1.3;
  margin-bottom: .5rem;
  color: var(--text);
}

.ep-title a {
  color: inherit;
  text-decoration: none;
}
.ep-title a:hover { color: var(--accent2); }

.ep-summary {
  font-size: .85rem;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: .9rem;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── audio player ── */
.ep-player {
  margin-top: .25rem;
}

audio {
  width: 100%;
  height: 36px;
  accent-color: var(--accent);
  border-radius: 4px;
}

/* Chrome / Safari custom player via filter trick */
audio::-webkit-media-controls-panel {
  background: var(--surface);
}

/* ── duration / size badge ── */
.ep-meta {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem .8rem;
  font-size: .72rem;
  color: var(--muted);
  margin-top: .6rem;
}

.badge {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: .15rem .45rem;
  font-size: .68rem;
  letter-spacing: .04em;
}

/* ── responsive ── */
@media (max-width: 540px) {
  .header-inner { flex-direction: column; gap: 1.25rem; }
  #podcast-image { width: 80px; height: 80px; }
  header { padding: 2rem 1.25rem; }
  main { padding: 2rem 1.25rem 4rem; }
  .ep-number { display: none; }
  .episode { grid-template-columns: 1fr; }
}

  </div>

  <script>
    // ── config ──────────────────────────────────────────────────────────────
    // Change this to point to any RSS / podcast XML file.
    // Using a relative path means it works without CORS issues when both
    // files live in the same directory on your server.
    const FEED_URL = new URLSearchParams(window.location.search).get('podcast');

    // ── helpers ─────────────────────────────────────────────────────────────
    const $  = id => document.getElementById(id);
    const ns = 'http://www.apple.com/DTDs/PodcastRSS-1.0.dtd'; // itunes ns

    function get(el, tag) {
      const node = el.querySelector(tag);
      return node ? (node.textContent || '').trim() : '';
    }

    function getAttr(el, tag, attr) {
      const node = el.querySelector(tag);
      return node ? (node.getAttribute(attr) || '') : '';
    }

    // iTunes namespace helper — browsers handle ns differently
    function getItunes(el, local) {
      // Try standard namespace query first, fall back to prefixed tag name
      try {
        const nodes = el.getElementsByTagNameNS('http://www.itunes.com/dtds/podcast-1.0.dtd', local);
        if (nodes.length) return nodes[0].textContent.trim();
      } catch(e) {}
      const node = el.querySelector('itunes\\:' + local) ||
                   el.querySelector('[localName="' + local + '"]');
      return node ? node.textContent.trim() : '';
    }

    function formatDate(str) {
      if (!str) return '';
      try {
        return new Date(str).toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
      } catch(e) { return str; }
    }

    function formatDuration(str) {
      if (!str) return '';
      // already HH:MM:SS or MM:SS
      if (/^\d+:\d+/.test(str)) return str;
      // seconds as integer
      const s = parseInt(str, 10);
      if (!isNaN(s)) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return h > 0
          ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
          : `${m}:${String(sec).padStart(2,'0')}`;
      }
      return str;
    }

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      return div.textContent || div.innerText || '';
    }

    // ── fetch & render ───────────────────────────────────────────────────────
    async function loadFeed() {
      if (!FEED_URL) {
        $('loading').style.display = 'none';
        $('error').style.display = 'flex';
        $('error-msg').textContent = 'No feed specified. Use ?podcast=yourfeed.xml';
        return;
      }
      try {
        const res = await fetch(FEED_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, 'application/xml');

        const parseErr = xml.querySelector('parsererror');
        if (parseErr) throw new Error('XML parse error');

        const channel = xml.querySelector('channel');
        if (!channel) throw new Error('No <channel> found in feed');

        renderFeed(channel);
      } catch (err) {
        $('loading').style.display = 'none';
        $('error').style.display = 'flex';
        $('error-msg').textContent = err.message;
      }
    }

    function renderFeed(channel) {
      // ── channel metadata ──
      const title       = get(channel, 'title');
      const description = getItunes(channel, 'summary') || get(channel, 'description');
      const link        = get(channel, 'link');
      const author      = getItunes(channel, 'author') || get(channel, 'managingEditor');
      const imgUrl      = getAttr(channel, 'image url', 'src') ||
                          get(channel, 'image > url') ||
                          getAttr(channel, 'itunes\\:image', 'href') ||
                          (() => {
                            try {
                              const nodes = channel.getElementsByTagNameNS('http://www.itunes.com/dtds/podcast-1.0.dtd', 'image');
                              return nodes.length ? nodes[0].getAttribute('href') : '';
                            } catch(e) { return ''; }
                          })();

      document.title = title || 'Podcast';
      $('podcast-title').textContent = title || 'Untitled Feed';
      $('podcast-description').textContent = stripHtml(description);

      if (imgUrl) {
        const img = $('podcast-image');
        img.src = imgUrl;
        img.style.display = 'block';
      }

      const meta = $('podcast-meta');
      if (author) meta.innerHTML += `<span>By ${author}</span>`;
      if (link)   meta.innerHTML += `<a href="${link}" target="_blank" rel="noopener">${link}</a>`;

      // ── episodes ──
      const items = Array.from(channel.querySelectorAll('item'));
      $('ep-count').textContent = `${items.length} Episode${items.length !== 1 ? 's' : ''}`;

      const container = $('episodes');

      items.forEach((item, i) => {
        const epTitle    = get(item, 'title');
        const epLink     = get(item, 'link') || getAttr(item, 'enclosure', 'url');
        const epDate     = formatDate(get(item, 'pubDate'));
        const epSummary  = stripHtml(getItunes(item, 'summary') || get(item, 'description'));
        const audioUrl   = getAttr(item, 'enclosure', 'url');
        const duration   = formatDuration(getItunes(item, 'duration'));
        const epNum      = getItunes(item, 'episode') || String(items.length - i);

        const card = document.createElement('article');
        card.className = 'episode';
        card.style.animationDelay = `${i * 60}ms`;

        card.innerHTML = `
          <div class="ep-number">${epNum}</div>
          <div class="ep-body">
            ${epDate ? `<p class="ep-date">${epDate}</p>` : ''}
            <h2 class="ep-title">
              ${epLink
                ? `<a href="${epLink}" target="_blank" rel="noopener">${epTitle || 'Untitled'}</a>`
                : (epTitle || 'Untitled')}
            </h2>
            ${epSummary ? `<p class="ep-summary">${epSummary}</p>` : ''}
            ${audioUrl ? `
              <div class="ep-player">
                <audio controls preload="none" src="${audioUrl}"></audio>
              </div>` : ''}
            ${duration ? `
              <div class="ep-meta">
                <span class="badge">⏱ ${duration}</span>
              </div>` : ''}
          </div>
        `;
        container.appendChild(card);
      });

      // ── show page ──
      $('loading').style.display = 'none';
      $('app').style.display = 'block';
    }

    loadFeed();
  </script>
