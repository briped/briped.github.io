<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podcast Feed – DR Lyd Recycled</title>
  <style>
    :root {
      --bg:        #1a1a1a;
      --surface:   #242424;
      --surface2:  #2c2c2c;
      --border:    #333333;
      --accent:    #c0392b;
      --accent-hv: #e74c3c;
      --text:      #e8e8e8;
      --text-muted:#999999;
      --radius:    6px;
      --logo-h:    2rem;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:        #f5f5f5;
        --surface:   #ffffff;
        --surface2:  #f0f0f0;
        --border:    #dddddd;
        --accent:    #c0392b;
        --accent-hv: #a93226;
        --text:      #1a1a1a;
        --text-muted:#666666;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    a { color: var(--accent); }
    a:hover { color: var(--accent-hv); }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0.75rem 1.25rem;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-link {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      line-height: 0;
    }
    .logo-link img {
      height: var(--logo-h);
      width: auto;
      display: block;
      transition: opacity 0.2s;
    }
    .logo-link:hover img { opacity: 0.75; }

    .header-title {
      flex: 1;
      text-align: center;
    }
    .header-title h1 {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    .header-title p {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 0.1rem;
    }
    .back-link {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .back-link:hover { color: var(--text); }

    /* ── MAIN ────────────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 1.5rem auto 3rem;
      padding: 0 1rem;
    }

    /* ── PODCAST HERO ────────────────────────────────────────── */
    .podcast-hero {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .podcast-cover {
      flex-shrink: 0;
      width: clamp(100px, 20vw, 180px);
    }
    .podcast-cover img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: var(--radius);
      display: block;
    }

    .podcast-info {
      flex: 1;
      min-width: 0;
    }
    .podcast-info h2 {
      font-size: clamp(1.2rem, 4vw, 1.75rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .podcast-info .description {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 1rem;
      /* Clamp long descriptions */
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .podcast-info .description.expanded {
      -webkit-line-clamp: unset;
    }
    .toggle-desc {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
      margin-bottom: 1rem;
      display: none; /* shown by JS when text overflows */
    }
    .toggle-desc:hover { color: var(--accent-hv); }

    /* Subscribe strip */
    .subscribe-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
    }
    .subscribe-bar span {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      flex-shrink: 0;
    }
    .subscribe-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.35rem 0.8rem;
      border-radius: 4px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .subscribe-btn:hover { background: var(--accent-hv); color: #fff; }
    .subscribe-btn.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .subscribe-btn.outline:hover { border-color: var(--accent); color: var(--text); }

    /* ── EPISODES ────────────────────────────────────────────── */
    .section-heading {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .episode-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .episode {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .episode-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      gap: 1rem;
      user-select: none;
    }
    .episode-header:hover { background: var(--surface2); }

    .episode-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .episode-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.1rem;
      flex-shrink: 0;
    }
    .episode-date {
      font-size: 0.73rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .episode-duration {
      font-size: 0.73rem;
      color: var(--text-muted);
    }
    .episode-chevron {
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 0.75rem;
      transition: transform 0.2s;
    }
    .episode.open .episode-chevron { transform: rotate(180deg); }

    /* Expanded episode body */
    .episode-body {
      display: none;
      padding: 0 1rem 1rem;
      border-top: 1px solid var(--border);
    }
    .episode.open .episode-body { display: block; }

    .episode-description {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-top: 0.75rem;
      margin-bottom: 1rem;
    }
    .episode-description p { margin-top: 0.5rem; }
    .episode-description p:first-child { margin-top: 0; }

    /* Audio player */
    .episode-player {
      width: 100%;
      border-radius: 4px;
      accent-color: var(--accent);
      outline: none;
    }
    /* Firefox doesn't honour accent-color on range inside audio. Just apply base style. */
    audio { display: block; }

    /* ── LOADING / ERROR STATES ──────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .state-msg.error { color: var(--accent-hv); }

    /* ── FOOTER ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem 1rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 540px) {
      .podcast-hero { flex-direction: column; }
      .podcast-cover { width: 120px; }
      .episode-title { white-space: normal; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo-link" href="https://www.dr.dk/lyd" title="DR Lyd" target="_blank" rel="noopener">
      <img src="assets/icon-logo-drlyd.svg" alt="DR Lyd">
    </a>
    <div class="header-title">
      <h1>DR Lyd</h1>
      <p>Recycled</p>
    </div>
    <a class="back-link" href="./">← Alle podcasts</a>
  </div>
</header>

<main>
  <div id="loading" class="state-msg">Henter feed…</div>
  <div id="error"   class="state-msg error" hidden></div>

  <!-- Hero & subscribe – populated by JS -->
  <div id="podcast-hero"   class="podcast-hero"   hidden></div>
  <div id="subscribe-bar"  class="subscribe-bar"  hidden></div>

  <p class="section-heading" id="episode-heading" hidden></p>
  <div id="episode-list" class="episode-list"></div>
</main>

<footer>
  <a href="./">DR Lyd – Recycled</a>
</footer>

<script>
(function () {
  'use strict';

  const params   = new URLSearchParams(location.search);
  const podcast  = params.get('podcast');

  if (!podcast) {
    showError('Intet podcast angivet. Gå <a href="./">tilbage</a>.');
    return;
  }

  // Build absolute URL for the feed (same origin)
  const feedUrl  = new URL(podcast, location.href).href;

  fetchFeed(feedUrl);

  // ─── Fetch & parse ────────────────────────────────────────
  async function fetchFeed(url) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'application/xml');
      const parseErr = xml.querySelector('parsererror');
      if (parseErr) throw new Error('Ugyldig XML');
      render(xml, url);
    } catch (err) {
      showError(`Kunne ikke hente feed.<br><small>${err.message}</small>`);
    }
  }

  // ─── Render ───────────────────────────────────────────────
  function render(xml, feedUrl) {
    const channel = xml.querySelector('channel');
    if (!channel) { showError('Ugyldigt RSS-format.'); return; }

    const t = (sel, ctx) => {
      const el = (ctx || channel).querySelector(sel);
      return el ? (el.textContent || '').trim() : '';
    };
    const attr = (sel, at, ctx) => {
      const el = (ctx || channel).querySelector(sel);
      return el ? (el.getAttribute(at) || '') : '';
    };

    // Podcast metadata
    const title   = t('title');
    const desc    = t('description');
    const cover   = attr('image', 'href') || attr('image url') || (() => {
      const img = channel.querySelector('image');
      return img ? t('url', img) : '';
    })();
    const link    = t('link');

    document.title = `${title} – DR Lyd Recycled`;

    // Hero
    const hero = document.getElementById('podcast-hero');
    hero.innerHTML = `
      <div class="podcast-cover">
        <img src="${esc(cover)}" alt="${esc(title)}" id="podcast-img">
      </div>
      <div class="podcast-info">
        <h2 id="podcast-title">${esc(title)}</h2>
        <p class="description" id="podcast-desc">${esc(desc)}</p>
        <button class="toggle-desc" id="toggle-desc" aria-expanded="false">Vis mere</button>
      </div>`;
    hero.hidden = false;

    // Expand/collapse description
    requestAnimationFrame(() => {
      const descEl  = document.getElementById('podcast-desc');
      const toggle  = document.getElementById('toggle-desc');
      if (descEl.scrollHeight > descEl.clientHeight + 2) {
        toggle.style.display = 'inline';
        toggle.addEventListener('click', () => {
          const open = toggle.getAttribute('aria-expanded') === 'true';
          descEl.classList.toggle('expanded', !open);
          toggle.setAttribute('aria-expanded', String(!open));
          toggle.textContent = open ? 'Vis mere' : 'Vis mindre';
        });
      }
    });

    // Subscribe bar
    const subBar = document.getElementById('subscribe-bar');
    subBar.innerHTML = `
      <span>Abonner:</span>
      <a class="subscribe-btn" href="podcast://${new URL(feedUrl).host}${new URL(feedUrl).pathname}" title="Åbn i podcast-app">
        🎙 Podcast-app
      </a>
      <a class="subscribe-btn outline" href="${esc(feedUrl)}" title="RSS-feed" target="_blank" rel="noopener">
        RSS
      </a>
      ${link ? `<a class="subscribe-btn outline" href="${esc(link)}" title="DR Lyd" target="_blank" rel="noopener">DR Lyd</a>` : ''}`;
    subBar.hidden = false;

    // Episodes
    const items = Array.from(xml.querySelectorAll('item'));
    const heading = document.getElementById('episode-heading');
    heading.textContent = `${items.length} episode${items.length !== 1 ? 'r' : ''}`;
    heading.hidden = false;

    const list = document.getElementById('episode-list');
    list.innerHTML = '';

    items.forEach((item, i) => {
      const etitle = t('title', item);
      const edesc  = t('description', item);
      const epubDate = t('pubDate', item);
      const edur  = t('duration', item) || '';   // itunes:duration
      const encUrl = attr('enclosure', 'url', item);
      const encType = attr('enclosure', 'type', item) || 'audio/mpeg';

      const dateStr = epubDate ? formatDate(epubDate) : '';
      const durStr  = edur ? formatDuration(edur) : '';

      const ep = document.createElement('div');
      ep.className = 'episode';
      ep.innerHTML = `
        <div class="episode-header" role="button" tabindex="0" aria-expanded="false">
          <span class="episode-title">${esc(etitle)}</span>
          <span class="episode-meta">
            ${dateStr ? `<span class="episode-date">${dateStr}</span>` : ''}
            ${durStr  ? `<span class="episode-duration">${durStr}</span>` : ''}
          </span>
          <span class="episode-chevron" aria-hidden="true">▼</span>
        </div>
        <div class="episode-body">
          ${edesc ? `<div class="episode-description">${sanitiseHtml(edesc)}</div>` : ''}
          ${encUrl ? `<audio class="episode-player" controls preload="none" src="${esc(encUrl)}" type="${esc(encType)}">Din browser understøtter ikke HTML5-lyd.</audio>` : ''}
        </div>`;

      const header = ep.querySelector('.episode-header');
      header.addEventListener('click', () => toggleEpisode(ep, header));
      header.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleEpisode(ep, header); }
      });

      list.appendChild(ep);
    });

    // Hide loading
    document.getElementById('loading').hidden = true;
  }

  function toggleEpisode(ep, header) {
    const open = ep.classList.toggle('open');
    header.setAttribute('aria-expanded', String(open));
    // Pause other open players when a new one opens
    if (open) {
      document.querySelectorAll('.episode.open audio').forEach(audio => {
        if (!ep.contains(audio)) audio.pause();
      });
    }
  }

  // ─── Helpers ──────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Allow a small safe subset of HTML from description
  function sanitiseHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    // Remove scripts / iframes
    tmp.querySelectorAll('script, iframe, object, embed').forEach(el => el.remove());
    return tmp.innerHTML;
  }

  function formatDate(str) {
    try {
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return str; }
  }

  function formatDuration(str) {
    // May come as "HH:MM:SS", "MM:SS", or plain seconds
    if (/^\d+$/.test(str)) {
      const s = parseInt(str, 10);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h > 0
        ? `${h}:${pad(m)}:${pad(sec)}`
        : `${m}:${pad(sec)}`;
    }
    return str;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function showError(msg) {
    document.getElementById('loading').hidden = true;
    const err = document.getElementById('error');
    err.innerHTML = msg;
    err.hidden = false;
  }
})();
</script>
</body>
</html>
